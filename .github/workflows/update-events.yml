name: Update Sky Event Schedule

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Raw event schedule JSON
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Save JSON
        run: |
          echo '${{ inputs.payload }}' > events.json

      - name: Convert events to CSV
        run: |
          mkdir -p PC/Utils

          jq -r '
            .event_schedule as $s
            | ["name","start_time","duration_minutes"],
            (
              $s.events[]
              | .name as $name
              | .duration as $duration
              | .when[]
              | ($s.base_time + .) as $ts
              | [$name, ($ts | strftime("%Y-%m-%d %H:%M:%S")), $duration]
            )
            | @csv
            ' events.json > PC/Utils/sky_events.csv

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add PC/Utils/sky_events.csv

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update Sky event schedule"
          git push
